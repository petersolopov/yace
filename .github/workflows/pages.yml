name: pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  site-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npx playwright test --project=site-chromium --project=site-firefox --project=site-webkit

  deploy:
    needs: site-e2e
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - run: npm ci

      # the landing imports yace from /src/*.js live; emit browser-runnable JS from the TS source
      - run: npx tsc -p tsconfig.pages.json

      # final _site layout: root = site/public/ (landing), /src/ = tsc-built
      # JS the import map resolves; /examples/ ships only as a redirect stub
      - run: cp -R site/public/. _site/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v5
