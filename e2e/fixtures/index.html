<!-- markdown.ts imports the bare "mdhl" specifier; the e2e server serves the
     repo root, so map it to the installed ESM build (also exercises mdhl's
     module field, complementing the CJS-interop unit tests) -->
<script type="importmap">
  {
    "imports": {
      "mdhl": "/node_modules/mdhl/dist/mdhl.esm.js"
    }
  }
</script>
<div id="editor"></div>
<script type="module">
  import { Yace } from "../../src/index.js";
  import { history } from "../../src/plugins/history.js";
  import { tab } from "../../src/plugins/tab.js";
  import { preserveIndent } from "../../src/plugins/preserveIndent.js";
  import { cutLine } from "../../src/plugins/cutLine.js";
  import { autoClose } from "../../src/plugins/autoClose.js";
  import { toggleComment } from "../../src/plugins/toggleComment.js";
  import { markdown } from "../../src/highlighters/markdown.js";

  window.Yace = Yace;
  window.plugins = {
    history,
    tab,
    preserveIndent,
    cutLine,
    autoClose,
    toggleComment,
  };
  window.highlighters = { markdown };

  const build = (spec) => {
    const name = typeof spec === "string" ? spec : spec.name;
    const options = typeof spec === "string" ? undefined : spec.options;

    if (name === "history") return history(options || {});
    if (name === "tab") return tab(options);
    if (name === "preserveIndent") return preserveIndent();
    if (name === "cutLine") return cutLine();
    if (name === "autoClose") return autoClose(options);
    if (name === "toggleComment") return toggleComment(options);
    throw new Error(`unknown plugin: ${name}`);
  };

  const buildHighlighter = (name) => {
    if (name === "markdown") return markdown();
    throw new Error(`unknown highlighter: ${name}`);
  };

  // #editor exposes the div as window.editor via named-element access, so the
  // live instance is tracked separately to guard destroy across re-creates
  let current = null;

  window.createEditor = (options = {}) => {
    if (current) {
      current.destroy();
    }

    const { plugins = [], highlighters, ...rest } = options;
    window.updates = [];
    current = new Yace("#editor", {
      ...rest,
      plugins: plugins.map(build),
      ...(highlighters ? { highlighters: highlighters.map(buildHighlighter) } : {}),
    });
    current.onUpdate((value) => window.updates.push(value));
    window.editor = current;
  };
</script>
